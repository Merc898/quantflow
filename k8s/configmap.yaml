apiVersion: v1
kind: ConfigMap
metadata:
  name: quantflow-config
  namespace: quantflow
  labels:
    app.kubernetes.io/name: quantflow
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  APP_VERSION: "1.0.0"
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  # Database (non-secret parts)
  POSTGRES_DB: "quantflow"
  POSTGRES_HOST: "quantflow-db-service"
  POSTGRES_PORT: "5432"
  # Redis
  REDIS_HOST: "quantflow-redis-service"
  REDIS_PORT: "6379"
  # Celery
  CELERY_CONCURRENCY: "8"
  # MLflow
  MLFLOW_TRACKING_URI: "http://quantflow-mlflow-service:5000"
