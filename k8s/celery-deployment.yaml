apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantflow-celery-worker
  namespace: quantflow
  labels:
    app.kubernetes.io/name: quantflow
    app.kubernetes.io/component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantflow-celery-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: quantflow-celery-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: celery-worker
          image: ghcr.io/your-org/quantflow-api:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - quantflow.api.celery_app
            - worker
            - --loglevel=info
            - --concurrency=8
            - -Q
            - default,agent_tasks
          envFrom:
            - configMapRef:
                name: quantflow-config
            - secretRef:
                name: quantflow-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - quantflow.api.celery_app
                - inspect
                - ping
                - -d
                - celery@$HOSTNAME
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 120  # allow in-flight tasks to complete

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantflow-celery-beat
  namespace: quantflow
  labels:
    app.kubernetes.io/name: quantflow
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1  # only one beat scheduler
  selector:
    matchLabels:
      app: quantflow-celery-beat
  template:
    metadata:
      labels:
        app: quantflow-celery-beat
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: celery-beat
          image: ghcr.io/your-org/quantflow-api:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - quantflow.api.celery_app
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: quantflow-config
            - secretRef:
                name: quantflow-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: beat-schedule
              mountPath: /app/celerybeat-schedule
      volumes:
        - name: beat-schedule
          persistentVolumeClaim:
            claimName: celery-beat-pvc
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: celery-beat-pvc
  namespace: quantflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
