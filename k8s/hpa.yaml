apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantflow-api-hpa
  namespace: quantflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantflow-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # 5-minute cooldown on scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantflow-celery-worker-hpa
  namespace: quantflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantflow-celery-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantflow-frontend-hpa
  namespace: quantflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantflow-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
