apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quantflow-ingress
  namespace: quantflow
  labels:
    app.kubernetes.io/name: quantflow
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "60"
    # TLS via cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - app.quantflow.io
        - api.quantflow.io
      secretName: quantflow-tls
  rules:
    # Frontend — app.quantflow.io
    - host: app.quantflow.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quantflow-frontend-service
                port:
                  number: 3000

    # API — api.quantflow.io
    - host: api.quantflow.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quantflow-api-service
                port:
                  number: 8000
