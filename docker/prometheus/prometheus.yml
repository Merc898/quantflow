# QuantFlow — Prometheus scrape configuration
# Retention and storage configured via CLI flags in docker-compose.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    service: quantflow

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alerting rules
rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:

  # QuantFlow FastAPI application
  - job_name: quantflow_api
    static_configs:
      - targets:
          - api:8000
    metrics_path: /metrics
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Redis exporter (optional — add redis-exporter service)
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
    # Comment out if redis-exporter not deployed

  # Node exporter — host metrics (optional)
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
    # Comment out if node-exporter not deployed

  # Celery via Flower metrics endpoint
  - job_name: celery
    static_configs:
      - targets:
          - flower:5555
    metrics_path: /metrics
