# QuantFlow — nginx reverse proxy configuration
# Sits in front of FastAPI (port 8000) and Next.js (port 3000)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # -----------------------------------------------------------------------
    # Upstream definitions
    # -----------------------------------------------------------------------
    upstream quantflow_api {
        server api:8000;
        keepalive 32;
    }

    upstream quantflow_frontend {
        server frontend:3000;
        keepalive 16;
    }

    # -----------------------------------------------------------------------
    # Main server block
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        client_max_body_size 10M;

        # ------------------------------------------------------------------
        # Health check (no rate limit, no auth)
        # ------------------------------------------------------------------
        location = /health {
            proxy_pass http://quantflow_api/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ------------------------------------------------------------------
        # Prometheus metrics (internal network only in production)
        # ------------------------------------------------------------------
        location = /metrics {
            proxy_pass http://quantflow_api/metrics;
            proxy_set_header Host $host;
            # Restrict to monitoring subnet in production
            # allow 10.0.0.0/8;
            # deny all;
            access_log off;
        }

        # ------------------------------------------------------------------
        # FastAPI REST API
        # ------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://quantflow_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://quantflow_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # WebSocket connections
        # ------------------------------------------------------------------
        location /ws/ {
            proxy_pass http://quantflow_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;  # Keep WS alive for 1 hour
        }

        # ------------------------------------------------------------------
        # FastAPI docs (dev only)
        # ------------------------------------------------------------------
        location ~ ^/(openapi\.json|api/docs|api/redoc) {
            proxy_pass http://quantflow_api;
            proxy_set_header Host $host;
        }

        # ------------------------------------------------------------------
        # Next.js frontend (catch-all)
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://quantflow_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
