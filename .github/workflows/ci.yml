name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Python lint + type-check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff black mypy types-python-dateutil types-pytz types-redis

      - name: Run ruff
        run: ruff check quantflow/ tests/

      - name: Run black (check mode)
        run: black --check quantflow/ tests/

      - name: Run mypy
        run: mypy quantflow/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Python unit tests
  # ---------------------------------------------------------------------------
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          df -h /

      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        # Heavy ML deps (torch, catboost, stable-baselines3, etc.) are in
        # the optional [ml] group. Tests guard them with importorskip /
        # _TORCH_AVAILABLE and skip gracefully when absent.
        run: pip install -e ".[dev]"

      - name: Run unit tests (no integration, no live APIs)
        run: |
          python -m pytest tests/ \
            --ignore=tests/integration \
            -v --tb=short \
            --cov=quantflow \
            --cov-report=xml \
            --cov-fail-under=50 \
            -q
        env:
          ENVIRONMENT: test
          DATABASE_URL: ""
          REDIS_URL: ""

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          flags: python
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Integration tests (requires services)
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    if: github.event_name == 'workflow_dispatch'  # requires live DB — run manually
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: quantflow
          POSTGRES_PASSWORD: quantflow
          POSTGRES_DB: quantflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package + test deps
        run: pip install -e ".[dev]"

      - name: Run API integration tests
        run: |
          python -m pytest tests/integration/test_api_endpoints.py \
            -v --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://quantflow:quantflow@localhost:5432/quantflow
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci

  # ---------------------------------------------------------------------------
  # Frontend lint + type-check + unit tests
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check || npx tsc --noEmit

      - name: Run Jest tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

  # ---------------------------------------------------------------------------
  # Docker build validation (no push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: quantflow-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: quantflow-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deployment config validation
  # ---------------------------------------------------------------------------
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate k8s manifests
        run: |
          kubeval k8s/*.yaml \
            --ignore-missing-schemas \
            --kubernetes-version 1.28.0
