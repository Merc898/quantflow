version: "3.9"

# QuantFlow — full development stack
#
# Services:
#   db            — TimescaleDB (PostgreSQL + time-series extension)
#   redis         — Cache, Celery broker/backend, rate-limit store
#   api           — FastAPI application server
#   celery-worker — Background task worker (agent intelligence cycles)
#   celery-beat   — Periodic task scheduler
#   frontend      — Next.js SaaS frontend
#   nginx         — Reverse proxy (port 80 entry point)
#   mlflow        — Experiment tracking UI
#   prometheus    — Metrics collection
#   grafana       — Metrics dashboards
#   alertmanager  — Alert routing (email / PagerDuty)
#
# Optional (--profile tools):
#   redis-commander  — Redis web UI
#   flower           — Celery task monitor
#
# Usage:
#   docker compose up -d                        # core services
#   docker compose --profile tools up -d        # include monitoring UIs
#   docker compose down                         # stop (keep volumes)
#   docker compose down -v                      # stop + wipe volumes

x-api-common: &api-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://quantflow:quantflow@db:5432/quantflow
    REDIS_URL: redis://redis:6379/0
    ENVIRONMENT: development
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: quantflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quantflow
      POSTGRES_PASSWORD: quantflow
      POSTGRES_DB: quantflow
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantflow -d quantflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: quantflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------

  api:
    <<: *api-common
    container_name: quantflow_api
    command: uvicorn quantflow.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./quantflow:/app/quantflow  # hot-reload in dev

  celery-worker:
    <<: *api-common
    container_name: quantflow_celery_worker
    command: celery -A quantflow.api.celery_app worker --loglevel=info --concurrency=4 -Q default,agent_tasks
    volumes:
      - ./quantflow:/app/quantflow

  celery-beat:
    <<: *api-common
    container_name: quantflow_celery_beat
    command: celery -A quantflow.api.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    volumes:
      - celery_beat_data:/app/celerybeat-schedule
      - ./quantflow:/app/quantflow

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: quantflow_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://nginx:80
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.25-alpine
    container_name: quantflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

  # ---------------------------------------------------------------------------
  # MLflow experiment tracking
  # ---------------------------------------------------------------------------

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: quantflow_mlflow
    restart: unless-stopped
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://quantflow:quantflow@db:5432/quantflow
        --default-artifact-root /mlflow/artifacts
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Monitoring stack
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: quantflow_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus

  alertmanager:
    image: prom/alertmanager:latest
    container_name: quantflow_alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:latest
    container_name: quantflow_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-quantflow}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

  # ---------------------------------------------------------------------------
  # Optional tooling (--profile tools)
  # ---------------------------------------------------------------------------

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: quantflow_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

  flower:
    <<: *api-common
    container_name: quantflow_flower
    command: celery -A quantflow.api.celery_app flower --port=5555
    ports:
      - "5555:5555"
    profiles:
      - tools

volumes:
  timescaledb_data:
    name: quantflow_timescaledb_data
  redis_data:
    name: quantflow_redis_data
  mlflow_artifacts:
    name: quantflow_mlflow_artifacts
  celery_beat_data:
    name: quantflow_celery_beat_data
  prometheus_data:
    name: quantflow_prometheus_data
  alertmanager_data:
    name: quantflow_alertmanager_data
  grafana_data:
    name: quantflow_grafana_data
